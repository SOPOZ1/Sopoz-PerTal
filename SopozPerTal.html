<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sopoz PerTal - Perpustakaan Digital</title>
<style>
  :root{
    --bg:#0f1419;
    --panel:#1a2230;
    --panel2:#222d3f;
    --accent:#4fd1c5;
    --accent2:#f6ad55;
    --text:#e6edf3;
    --muted:#8a96a3;
    --danger:#f56565;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI',Roboto,Arial,sans-serif;
    background:linear-gradient(160deg,#0f1419,#16202b);
    color:var(--text);
    min-height:100vh;
  }
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 28px;
    background:rgba(26,34,48,0.9);
    backdrop-filter:blur(6px);
    border-bottom:1px solid #28344533;
    position:sticky;top:0;z-index:10;
  }
  .logo{
    display:flex;align-items:center;gap:10px;font-weight:700;font-size:20px;
  }
  .logo span.icon{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    width:36px;height:36px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;color:#0f1419;
  }
  nav{display:flex;gap:8px;flex-wrap:wrap;}
  nav button{
    background:transparent;border:1px solid #2c3a4d;color:var(--muted);
    padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px;
    transition:.2s;
  }
  nav button.active, nav button:hover{
    background:var(--accent);color:#0f1419;border-color:var(--accent);
  }
  main{padding:28px;max-width:1200px;margin:0 auto;}
  .stats{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:16px;margin-bottom:24px;
  }
  .stat-card{
    background:var(--panel);border-radius:var(--radius);padding:18px;
    border:1px solid #28344533;
  }
  .stat-card .num{font-size:28px;font-weight:700;color:var(--accent);}
  .stat-card .label{color:var(--muted);font-size:13px;margin-top:4px;}

  .toolbar{
    display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:center;
  }
  .toolbar input, .toolbar select{
    background:var(--panel2);border:1px solid #2c3a4d;color:var(--text);
    padding:10px 14px;border-radius:8px;font-size:14px;outline:none;
  }
  .toolbar input{flex:1;min-width:200px;}
  .active-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .chip{
    background:var(--panel2);border:1px solid var(--accent);color:var(--accent);
    padding:5px 12px;border-radius:20px;font-size:12px;display:flex;align-items:center;gap:6px;
  }
  .chip button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;padding:0;}
  #toastContainer{
    position:fixed;bottom:24px;right:24px;z-index:200;
    display:flex;flex-direction:column;gap:10px;
  }
  .toast{
    background:var(--panel);border:1px solid #2c3a4d;border-left:4px solid var(--accent);
    color:var(--text);padding:14px 18px;border-radius:8px;min-width:260px;
    box-shadow:0 6px 20px rgba(0,0,0,0.4);
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    animation:slideIn .25s ease-out;font-size:14px;
  }
  .toast.error{border-left-color:var(--danger);}
  .toast.success{border-left-color:#48bb78;}
  .toast button.undo{
    background:var(--accent);color:#0f1419;border:none;padding:5px 12px;
    border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;
  }
  @keyframes slideIn{from{transform:translateX(40px);opacity:0;}to{transform:translateX(0);opacity:1;}}
  .field.error input, .field.error select{border-color:var(--danger);}
  .field .errmsg{color:var(--danger);font-size:12px;margin-top:4px;display:none;}
  .field.error .errmsg{display:block;}
  kbd{
    background:#2c3a4d;border-radius:4px;padding:1px 6px;font-size:11px;border:1px solid #3a4a60;
  }
  .riwayat-item{
    background:var(--panel2);border-radius:8px;padding:12px 14px;
    border:1px solid #2c3a4d;display:flex;justify-content:space-between;align-items:center;gap:10px;
  }
  .riwayat-item .info b{display:block;font-size:14px;}
  .riwayat-item .info span{color:var(--muted);font-size:12px;}
  .riwayat-item .status{
    font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600;white-space:nowrap;
  }
  .riwayat-item .status.aktif{background:#a8552233;color:var(--accent2);}
  .riwayat-item .status.selesai{background:#2f7d5733;color:#48bb78;}
  .btn{
    background:linear-gradient(135deg,var(--accent),#38b2ac);
    color:#0f1419;border:none;padding:10px 18px;border-radius:8px;
    font-weight:600;cursor:pointer;font-size:14px;transition:.2s;
  }
  .btn:hover{filter:brightness(1.1);}
  .btn.secondary{background:var(--panel2);color:var(--text);border:1px solid #2c3a4d;}
  .btn.danger{background:var(--danger);color:#fff;}

  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:18px;
  }
  .book{
    background:var(--panel);border-radius:var(--radius);padding:16px;
    border:1px solid #28344533;display:flex;flex-direction:column;gap:8px;
    transition:.2s;
  }
  .book:hover{transform:translateY(-3px);border-color:var(--accent);}
  .cover{
    height:130px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-size:36px;color:#0f1419;font-weight:700;
  }
  .book h3{margin:0;font-size:16px;}
  .book .meta{color:var(--muted);font-size:12px;}
  .badge{
    display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;
    width:fit-content;
  }
  .badge.tersedia{background:#2f7d5733;color:#48bb78;}
  .badge.dipinjam{background:#a8552233;color:var(--accent2);}
  .book-actions{display:flex;gap:6px;margin-top:6px;}
  .book-actions button{flex:1;padding:7px;font-size:12px;border-radius:6px;border:none;cursor:pointer;}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.6);
    display:none;align-items:center;justify-content:center;z-index:100;
  }
  .modal-overlay.show{display:flex;}
  .modal{
    background:var(--panel);border-radius:var(--radius);padding:24px;
    width:90%;max-width:420px;border:1px solid #2c3a4d;
  }
  .modal h2{margin-top:0;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;}
  .field input, .field select{
    width:100%;background:var(--panel2);border:1px solid #2c3a4d;color:var(--text);
    padding:10px;border-radius:8px;font-size:14px;
  }
  .modal-buttons{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
  .empty{text-align:center;color:var(--muted);padding:60px 0;}
  footer{text-align:center;color:var(--muted);font-size:13px;padding:24px;}
</style>
</head>
<body>

<header>
  <div class="logo"><span class="icon">📚</span> Sopoz PerTal</div>
  <nav>
    <button class="tab-btn active" data-tab="katalog">Katalog</button>
    <button class="tab-btn" data-tab="anggota">Anggota</button>
  </nav>
  <button class="btn" id="btnTambah">+ Tambah Buku</button>
</header>

<main>
  <div class="stats">
    <div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">Total Buku</div></div>
    <div class="stat-card"><div class="num" id="statTersedia">0</div><div class="label">Tersedia</div></div>
    <div class="stat-card"><div class="num" id="statDipinjam">0</div><div class="label">Sedang Dipinjam</div></div>
    <div class="stat-card"><div class="num" id="statKategori">0</div><div class="label">Kategori</div></div>
  </div>

  <div id="tab-katalog">
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="🔍 Cari judul atau penulis...">
      <select id="filterKategori"><option value="">Semua Kategori</option></select>
      <select id="filterStatus">
        <option value="">Semua Status</option>
        <option value="tersedia">Tersedia</option>
        <option value="dipinjam">Dipinjam</option>
      </select>
    </div>
    <div class="active-filters" id="activeFilters"></div>
    <div class="grid" id="bookGrid"></div>
  </div>

  <div id="tab-anggota" style="display:none;">
    <div class="toolbar">
      <input type="text" id="namaAnggotaBaru" placeholder="Nama anggota baru...">
      <button class="btn" id="btnTambahAnggota">+ Tambah Anggota</button>
    </div>
    <div class="grid" id="anggotaGrid"></div>
  </div>
</main>

<footer>Sopoz PerTal &copy; 2026 — Perpustakaan Digital Sederhana<br>
  <small>Shortcut: <kbd>Ctrl</kbd>+<kbd>B</kbd> Tambah Buku &nbsp;|&nbsp; <kbd>Esc</kbd> Tutup Dialog &nbsp;|&nbsp; <kbd>Enter</kbd> Simpan</small>
</footer>

<div id="toastContainer"></div>

<!-- Modal Tambah/Edit Buku -->
<div class="modal-overlay" id="modalBuku">
  <div class="modal">
    <h2 id="modalBukuTitle">Tambah Buku</h2>
    <div class="field"><label>Judul Buku</label><input type="text" id="inputJudul"></div>
    <div class="field"><label>Penulis</label><input type="text" id="inputPenulis"></div>
    <div class="field"><label>Kategori</label><input type="text" id="inputKategori" placeholder="Fiksi, Sains, Sejarah, dll"></div>
    <div class="field"><label>Tahun Terbit</label><input type="number" id="inputTahun" placeholder="2024"></div>
    <div class="field"><label>Jumlah Stok</label><input type="number" id="inputStok" value="1" min="1"></div>
    <div class="field">
      <label>Foto Sampul Buku</label>
      <input type="file" id="inputFoto" accept="image/*">
      <img id="previewFoto" src="" style="display:none;margin-top:8px;width:80px;height:100px;object-fit:cover;border-radius:8px;">
    </div>
    <div class="modal-buttons">
      <button class="btn secondary" id="btnBatalBuku">Batal</button>
      <button class="btn" id="btnSimpanBuku">Simpan</button>
    </div>
  </div>
</div>

<!-- Modal Pinjam -->
<div class="modal-overlay" id="modalPinjam">
  <div class="modal">
    <h2>Pinjamkan Buku</h2>
    <div class="field">
      <label>Pilih Anggota</label>
      <select id="selectAnggota"></select>
    </div>
    <div class="modal-buttons">
      <button class="btn secondary" id="btnBatalPinjam">Batal</button>
      <button class="btn" id="btnKonfirmasiPinjam">Pinjamkan</button>
    </div>
  </div>
</div>

<!-- Modal Riwayat Peminjaman -->
<div class="modal-overlay" id="modalRiwayat">
  <div class="modal" style="max-width:520px;">
    <h2 id="riwayatTitle">Riwayat Peminjaman</h2>
    <div id="riwayatList" style="max-height:360px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;"></div>
    <div class="modal-buttons">
      <button class="btn secondary" id="btnTutupRiwayat">Tutup</button>
    </div>
  </div>
</div>

let data = loadData();

  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

// ====== ELEMENTS ======
const bookGrid = document.getElementById('bookGrid');
const anggotaGrid = document.getElementById('anggotaGrid');
const searchInput = document.getElementById('searchInput');
const filterKategori = document.getElementById('filterKategori');
const filterStatus = document.getElementById('filterStatus');

const modalBuku = document.getElementById('modalBuku');
const modalPinjam = document.getElementById('modalPinjam');
const modalRiwayat = document.getElementById('modalRiwayat');
let editingBookId = null;
let pinjamBookId = null;
let currentFotoData = '';

// ====== TOAST NOTIFICATION (Rule 3: Informative Feedback, Rule 6: Easy Reversal) ======
const toastContainer = document.getElementById('toastContainer');
function showToast(message, type='success', undoFn=null){
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.innerHTML = `<span>${message}</span>`;
  if(undoFn){
    const btn = document.createElement('button');
    btn.className = 'undo';
    btn.textContent = 'Urungkan';
    btn.onclick = ()=>{ undoFn(); toast.remove(); };
    toast.appendChild(btn);
  }
  toastContainer.appendChild(toast);
  setTimeout(()=>{ if(toast.parentNode) toast.remove(); }, undoFn ? 6000 : 3000);
}

const coverColors = ['#4fd1c5','#f6ad55','#fc8181','#9f7aea','#68d391','#63b3ed'];
function colorFor(id){ return coverColors[id % coverColors.length]; }

// ====== RENDER ======
function renderStats(){
  const total = data.books.reduce((a,b)=>a+b.stok,0);
  const dipinjam = data.books.reduce((a,b)=>a+b.dipinjam,0);
  const tersedia = total - dipinjam;
  const kategoriSet = new Set(data.books.map(b=>b.kategori));
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statTersedia').textContent = tersedia;
  document.getElementById('statDipinjam').textContent = dipinjam;
  document.getElementById('statKategori').textContent = kategoriSet.size;
}

function renderFilterKategori(){
  const cur = filterKategori.value;
  const kategoriSet = [...new Set(data.books.map(b=>b.kategori))].sort();
  filterKategori.innerHTML = '<option value="">Semua Kategori</option>' +
    kategoriSet.map(k=>`<option value="${k}">${k}</option>`).join('');
  filterKategori.value = cur;
}

function renderActiveFilters(){
  const el = document.getElementById('activeFilters');
  const chips = [];
  if(searchInput.value.trim()){
    chips.push(`<div class="chip">🔍 "${escapeHtml(searchInput.value.trim())}" <button onclick="clearFilter('search')">✕</button></div>`);
  }
  if(filterKategori.value){
    chips.push(`<div class="chip">🏷️ ${escapeHtml(filterKategori.value)} <button onclick="clearFilter('kategori')">✕</button></div>`);
  }
  if(filterStatus.value){
    chips.push(`<div class="chip">📌 ${filterStatus.value==='tersedia'?'Tersedia':'Dipinjam'} <button onclick="clearFilter('status')">✕</button></div>`);
  }
  el.innerHTML = chips.join('');
}
function clearFilter(type){
  if(type==='search') searchInput.value='';
  if(type==='kategori') filterKategori.value='';
  if(type==='status') filterStatus.value='';
  renderBooks();
}

function renderBooks(){
  const q = searchInput.value.toLowerCase().trim();
  const fk = filterKategori.value;
  const fs = filterStatus.value;

  let list = data.books.filter(b=>{
    const matchQ = !q || b.judul.toLowerCase().includes(q) || b.penulis.toLowerCase().includes(q);
    const matchK = !fk || b.kategori === fk;
    const tersediaCount = b.stok - b.dipinjam;
    let matchS = true;
    if(fs === 'tersedia') matchS = tersediaCount > 0;
    if(fs === 'dipinjam') matchS = b.dipinjam > 0;
    return matchQ && matchK && matchS;
  });

  if(list.length === 0){
    bookGrid.innerHTML = '<div class="empty">📭 Tidak ada buku yang ditemukan.</div>';
    renderActiveFilters();
    return;
  }

  bookGrid.innerHTML = list.map(b=>{
    const tersediaCount = b.stok - b.dipinjam;
    const statusClass = tersediaCount > 0 ? 'tersedia' : 'dipinjam';
    const statusText = tersediaCount > 0 ? `${tersediaCount} Tersedia` : 'Habis Dipinjam';
    return `
    <div class="book">
      <div class="cover" style="background:${colorFor(b.id)}">${b.foto ? `<img src="${b.foto}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">` : escapeHtml(b.judul.charAt(0).toUpperCase())}</div>
      <h3>${escapeHtml(b.judul)}</h3>
      <div class="meta">✍️ ${escapeHtml(b.penulis)} · ${b.tahun}</div>
      <div class="meta">🏷️ ${escapeHtml(b.kategori)} · Stok: ${b.stok}</div>
      <span class="badge ${statusClass}">${statusText}</span>
      <div class="book-actions">
        <button onclick="openPinjam(${b.id})" style="background:var(--accent);color:#0f1419;" ${tersediaCount<=0?'disabled':''}>Pinjam</button>
        <button onclick="kembalikan(${b.id})" style="background:var(--panel2);color:var(--text);" ${b.dipinjam<=0?'disabled':''}>Kembali</button>
        <button onclick="openEditBuku(${b.id})" style="background:var(--panel2);color:var(--text);">Edit</button>
        <button onclick="hapusBuku(${b.id})" style="background:var(--danger);color:#fff;">Hapus</button>
      </div>
    </div>`;
  }).join('');
  renderActiveFilters();
}

function renderAnggota(){
  if(data.members.length===0){
    anggotaGrid.innerHTML = '<div class="empty">Belum ada anggota.</div>';
    return;
  }
  anggotaGrid.innerHTML = data.members.map(m=>{
    const jumlahPinjam = data.loans.filter(l=>l.memberId===m.id && !l.dikembalikan).length;
    return `
    <div class="book">
      <div class="cover" style="background:${colorFor(m.id+10)}">${m.nama.charAt(0).toUpperCase()}</div>
      <h3>${escapeHtml(m.nama)}</h3>
      <div class="meta">📖 Sedang pinjam: ${jumlahPinjam} buku</div>
      <div class="book-actions">
        <button onclick="lihatRiwayat(${m.id})" style="background:var(--accent);color:#0f1419;">Riwayat</button>
        <button onclick="hapusAnggota(${m.id})" style="background:var(--danger);color:#fff;">Hapus</button>
      </div>
    </div>`;
  }).join('');
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function renderAll(){
  renderStats();
  renderFilterKategori();
  renderBooks();
  renderAnggota();
  saveData();
}

// ====== TAB SWITCH ======
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById('tab-katalog').style.display = tab==='katalog' ? 'block':'none';
    document.getElementById('tab-anggota').style.display = tab==='anggota' ? 'block':'none';
  });
});

// ====== BOOK CRUD ======
document.getElementById('btnTambah').addEventListener('click', ()=>{
  editingBookId = null;
  document.getElementById('modalBukuTitle').textContent = 'Tambah Buku';
  document.getElementById('inputJudul').value='';
  document.getElementById('inputPenulis').value='';
  document.getElementById('inputKategori').value='';
  document.getElementById('inputTahun').value='';
  document.getElementById('inputStok').value=1;
  document.getElementById('inputFoto').value='';
  document.getElementById('previewFoto').style.display='none';
  document.getElementById('previewFoto').src='';
  currentFotoData = '';
  modalBuku.classList.add('show');
});

function openEditBuku(id){
  const b = data.books.find(x=>x.id===id);
  if(!b) return;
  editingBookId = id;
  document.getElementById('modalBukuTitle').textContent = 'Edit Buku';
  document.getElementById('inputJudul').value=b.judul;
  document.getElementById('inputPenulis').value=b.penulis;
  document.getElementById('inputKategori').value=b.kategori;
  document.getElementById('inputTahun').value=b.tahun;
  document.getElementById('inputStok').value=b.stok;
  document.getElementById('inputFoto').value='';
  currentFotoData = b.foto || '';
  if(b.foto){
    document.getElementById('previewFoto').src = b.foto;
    document.getElementById('previewFoto').style.display='block';
  } else {
    document.getElementById('previewFoto').style.display='none';
    document.getElementById('previewFoto').src='';
  }
  modalBuku.classList.add('show');
}

document.getElementById('btnBatalBuku').addEventListener('click', ()=> modalBuku.classList.remove('show'));

document.getElementById('inputFoto').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    currentFotoData = ev.target.result;
    document.getElementById('previewFoto').src = currentFotoData;
    document.getElementById('previewFoto').style.display='block';
  };
  reader.readAsDataURL(file);
});

document.getElementById('btnSimpanBuku').addEventListener('click', simpanBuku);

function clearErrors(){
  document.querySelectorAll('.field').forEach(f=>{
    f.classList.remove('error');
  });
}

function simpanBuku(){
  clearErrors();
  const judulEl = document.getElementById('inputJudul');
  const penulisEl = document.getElementById('inputPenulis');
  const judul = judulEl.value.trim();
  const penulis = penulisEl.value.trim();
  const kategori = document.getElementById('inputKategori').value.trim() || 'Umum';
  const tahun = parseInt(document.getElementById('inputTahun').value) || new Date().getFullYear();
  const stok = Math.max(1, parseInt(document.getElementById('inputStok').value) || 1);

  let valid = true;
  if(!judul){ judulEl.closest('.field').classList.add('error'); valid = false; }
  if(!penulis){ penulisEl.closest('.field').classList.add('error'); valid = false; }
  if(!valid){
    showToast('Judul dan penulis wajib diisi sebelum disimpan.', 'error');
    return;
  }

  if(editingBookId){
    const b = data.books.find(x=>x.id===editingBookId);
    if(b){
      b.judul=judul; b.penulis=penulis; b.kategori=kategori; b.tahun=tahun;
      b.stok = Math.max(stok, b.dipinjam);
      b.foto = currentFotoData;
    }
    showToast(`Buku "${judul}" berhasil diperbarui.`, 'success');
  } else {
    data.books.push({id:data.nextBookId++, judul, penulis, kategori, tahun, stok, dipinjam:0, foto:currentFotoData});
    showToast(`Buku "${judul}" berhasil ditambahkan.`, 'success');
  }
  modalBuku.classList.remove('show');
  renderAll();
}

function hapusBuku(id){
  const idx = data.books.findIndex(b=>b.id===id);
  if(idx===-1) return;
  const backupBook = JSON.parse(JSON.stringify(data.books[idx]));
  const backupLoans = JSON.parse(JSON.stringify(data.loans.filter(l=>l.bookId===id)));
  if(!confirm(`Hapus buku "${backupBook.judul}"? Aksi ini bisa diurungkan lewat notifikasi setelahnya.`)) return;

  data.books.splice(idx,1);
  data.loans = data.loans.filter(l=>l.bookId!==id);
  renderAll();
  showToast(`Buku "${backupBook.judul}" dihapus.`, 'success', ()=>{
    data.books.push(backupBook);
    data.loans.push(...backupLoans);
    renderAll();
    showToast(`Buku "${backupBook.judul}" dikembalikan.`, 'success');
  });
}

// ====== PINJAM / KEMBALI ======
function openPinjam(bookId){
  if(data.members.length===0){
    alert('Belum ada anggota. Tambahkan anggota terlebih dahulu di tab Anggota.');
    return;
  }
  pinjamBookId = bookId;
  const sel = document.getElementById('selectAnggota');
  sel.innerHTML = data.members.map(m=>`<option value="${m.id}">${escapeHtml(m.nama)}</option>`).join('');
  modalPinjam.classList.add('show');
}

document.getElementById('btnBatalPinjam').addEventListener('click', ()=> modalPinjam.classList.remove('show'));

document.getElementById('btnKonfirmasiPinjam').addEventListener('click', ()=>{
  const memberId = parseInt(document.getElementById('selectAnggota').value);
  const b = data.books.find(x=>x.id===pinjamBookId);
  if(!b) return;
  if(b.dipinjam >= b.stok){
    showToast('Stok buku ini sudah habis dipinjam.', 'error');
    return;
  }
  b.dipinjam++;
  const member = data.members.find(m=>m.id===memberId);
  data.loans.push({id:Date.now(), bookId:b.id, memberId, tanggal:new Date().toISOString(), dikembalikan:false});
  modalPinjam.classList.remove('show');
  renderAll();
  showToast(`"${b.judul}" dipinjamkan ke ${member ? member.nama : 'anggota'}.`, 'success');
});

function kembalikan(bookId){
  const b = data.books.find(x=>x.id===bookId);
  if(!b || b.dipinjam<=0) return;
  const loan = data.loans.find(l=>l.bookId===bookId && !l.dikembalikan);
  if(loan) loan.dikembalikan = true;
  b.dipinjam--;
  renderAll();
  showToast(`"${b.judul}" telah dikembalikan.`, 'success');
}

// ====== ANGGOTA ======
document.getElementById('btnTambahAnggota').addEventListener('click', ()=>{
  const input = document.getElementById('namaAnggotaBaru');
  const nama = input.value.trim();
  if(!nama){
    showToast('Masukkan nama anggota terlebih dahulu.', 'error');
    input.focus();
    return;
  }
  const duplikat = data.members.some(m=>m.nama.toLowerCase()===nama.toLowerCase());
  if(duplikat){
    showToast(`Anggota bernama "${nama}" sudah ada.`, 'error');
    return;
  }
  data.members.push({id:data.nextMemberId++, nama});
  input.value='';
  renderAll();
  showToast(`Anggota "${nama}" berhasil ditambahkan.`, 'success');
});

// ====== RIWAYAT PEMINJAMAN ======
function lihatRiwayat(memberId){
  const member = data.members.find(m=>m.id===memberId);
  if(!member) return;
  document.getElementById('riwayatTitle').textContent = `Riwayat Peminjaman — ${member.nama}`;

  const riwayat = data.loans
    .filter(l=>l.memberId===memberId)
    .sort((a,b)=> new Date(b.tanggal) - new Date(a.tanggal));

  const list = document.getElementById('riwayatList');
  if(riwayat.length===0){
    list.innerHTML = '<div class="empty">Belum ada riwayat peminjaman.</div>';
  } else {
    list.innerHTML = riwayat.map(l=>{
      const book = data.books.find(b=>b.id===l.bookId);
      const judul = book ? book.judul : '(buku telah dihapus)';
      const tgl = new Date(l.tanggal).toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
      const statusClass = l.dikembalikan ? 'selesai' : 'aktif';
      const statusText = l.dikembalikan ? 'Sudah Dikembalikan' : 'Sedang Dipinjam';
      return `
      <div class="riwayat-item">
        <div class="info">
          <b>${escapeHtml(judul)}</b>
          <span>Dipinjam: ${tgl}</span>
        </div>
        <span class="status ${statusClass}">${statusText}</span>
      </div>`;
    }).join('');
  }
  modalRiwayat.classList.add('show');
}

document.getElementById('btnTutupRiwayat').addEventListener('click', ()=> modalRiwayat.classList.remove('show'));

function hapusAnggota(id){
  const idx = data.members.findIndex(m=>m.id===id);
  if(idx===-1) return;
  const aktifPinjam = data.loans.some(l=>l.memberId===id && !l.dikembalikan);
  if(aktifPinjam){
    showToast('Anggota ini masih punya buku yang belum dikembalikan. Tidak bisa dihapus.', 'error');
    return;
  }
  const backup = JSON.parse(JSON.stringify(data.members[idx]));
  if(!confirm(`Hapus anggota "${backup.nama}"?`)) return;
  data.members.splice(idx,1);
  renderAll();
  showToast(`Anggota "${backup.nama}" dihapus.`, 'success', ()=>{
    data.members.push(backup);
    renderAll();
    showToast(`Anggota "${backup.nama}" dikembalikan.`, 'success');
  });
}

// ====== FILTERS ======
searchInput.addEventListener('input', renderBooks);
filterKategori.addEventListener('change', renderBooks);
filterStatus.addEventListener('change', renderBooks);

// ====== KEYBOARD SHORTCUTS (Rule 2: Shortcuts, Rule 4: Closure) ======
document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape'){
    modalBuku.classList.remove('show');
    modalPinjam.classList.remove('show');
    modalRiwayat.classList.remove('show');
  }
  if((e.ctrlKey || e.metaKey) && e.key.toLowerCase()==='b'){
    e.preventDefault();
    document.getElementById('btnTambah').click();
  }
  if(e.key === 'Enter'){
    if(modalBuku.classList.contains('show') && document.activeElement.tagName !== 'TEXTAREA'){
      simpanBuku();
    } else if(modalPinjam.classList.contains('show')){
      document.getElementById('btnKonfirmasiPinjam').click();
    }
  }
});

// ====== INIT ======
renderAll();
</script>
</body>
</html>
